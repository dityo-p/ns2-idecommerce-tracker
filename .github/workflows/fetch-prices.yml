name: Fetch prices

on:
  schedule:
    - cron: "0 2,14 * * *"   # 9 AM and 9 PM WIB (02:00 and 14:00 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "fetch"
        type: choice
        options: [fetch, export-only, status, diagnose]

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install Python dependencies
        run: pip install -r engine/requirements.txt

      # Install Chromium browser binary — this is what actually runs the pages
      # Note: --with-deps fails on Ubuntu 24.04 (libasound2 renamed to libasound2t64)
      # We install the required system libraries manually first, then install without --with-deps
      - name: Install Playwright system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y             libasound2t64             libatk-bridge2.0-0             libatk1.0-0             libcairo2             libcups2             libdbus-1-3             libdrm2             libgbm1             libglib2.0-0             libnspr4             libnss3             libpango-1.0-0             libx11-6             libxcb1             libxcomposite1             libxdamage1             libxext6             libxfixes3             libxkbcommon0             libxrandr2             xvfb

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      # ── Restore SQLite DB ─────────────────────────────────────────────────
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: engine/ns2_tracker.db
          key: ns2-db-v2-${{ github.run_id }}
          restore-keys: |
            ns2-db-v2-

      - name: Diagnose configuration
        env:
          DATA_DIR: ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: python main.py --diagnose

      - name: Run price engine
        env:
          DATA_DIR: ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: |
          MODE="${{ github.event.inputs.mode || 'fetch' }}"
          echo "Mode: $MODE"
          if   [ "$MODE" = "export-only" ]; then python main.py --export-only
          elif [ "$MODE" = "status"      ]; then python main.py --status
          elif [ "$MODE" = "diagnose"    ]; then echo "(already ran above)"
          else python main.py
          fi

      - name: Show exported data
        if: always()
        run: |
          echo "=== prices.json ==="
          python3 -c "
          import json
          try:
              d = json.load(open('dashboard/data/prices.json'))
              print(f'  source={d.get(\"source\")}  demo={d.get(\"is_demo\")}  listings={len(d.get(\"listings\",[]))}')
              for l in d.get('listings',[]):
                  print(f'    {l[\"seller\"]:<22} {l[\"platform\"]:<12} Rp {l[\"price\"]:>10,}  {l[\"stock\"]}')
          except Exception as e:
              print(f'  error: {e}')
          " 2>/dev/null || true

      - name: Upload engine log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-log-${{ github.run_number }}
          path: engine/engine.log
          retention-days: 14

      - name: Commit data files
        if: github.event.inputs.mode != 'status' && github.event.inputs.mode != 'diagnose'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/prices.json \
                  dashboard/data/history.json \
                  dashboard/data/meta.json    || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update price data [skip ci]"
            git push
            echo "✅ Pushed."
          fi
