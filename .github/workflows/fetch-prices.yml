name: Fetch prices

on:
  # Twice a day — 9 AM and 9 PM WIB (02:00 and 14:00 UTC)
  # 9 listings × 2 runs/day × 30 days = 540 requests/month
  # Serper free tier: 2,500/month  |  SerpApi free tier: 100/month
  # → Both are sufficient. Serper is primary; SerpApi is fallback.
  schedule:
    - cron: "0 2,14 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "fetch"
        type: choice
        options: [fetch, export-only, status, diagnose]

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Check API keys
        env:
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          echo "=== API key check ==="
          if [ -n "$SERPER_KEY" ];  then echo "✅ SERPER_KEY set  (${#SERPER_KEY} chars)"; else echo "❌ SERPER_KEY not set"; fi
          if [ -n "$SERPAPI_KEY" ]; then echo "✅ SERPAPI_KEY set (${#SERPAPI_KEY} chars)"; else echo "❌ SERPAPI_KEY not set"; fi
          if [ -z "$SERPER_KEY" ] && [ -z "$SERPAPI_KEY" ]; then
            echo "⚠️  No keys found — will output demo data."
          fi
          echo "====================="

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: engine/ns2_tracker.db
          key: ns2-db-v2-${{ github.run_id }}
          restore-keys: |
            ns2-db-v2-

      - name: Diagnose configuration
        env:
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DATA_DIR:    ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: python main.py --diagnose

      - name: Run price engine
        env:
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          DATA_DIR:    ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: |
          MODE="${{ github.event.inputs.mode || 'fetch' }}"
          echo "Mode: $MODE"
          if   [ "$MODE" = "export-only" ]; then python main.py --export-only
          elif [ "$MODE" = "status"      ]; then python main.py --status
          elif [ "$MODE" = "diagnose"    ]; then echo "(already ran above)"
          else python main.py
          fi

      - name: Show exported data
        if: always()
        run: |
          echo "=== prices.json ==="
          python3 -c "
          import json
          try:
              d = json.load(open('dashboard/data/prices.json'))
              print(f'  source={d.get(\"source\")}  demo={d.get(\"is_demo\")}  listings={len(d.get(\"listings\",[]))}')
              for l in d.get('listings',[]):
                  print(f'    {l[\"seller\"]:<22} {l[\"platform\"]:<12} Rp {l[\"price\"]:>10,}  {l[\"stock\"]}')
          except Exception as e:
              print(f'  error: {e}')
          " 2>/dev/null || true

      - name: Upload engine log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-log-${{ github.run_number }}
          path: engine/engine.log
          retention-days: 14

      - name: Commit data files
        if: github.event.inputs.mode != 'status' && github.event.inputs.mode != 'diagnose'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/prices.json \
                  dashboard/data/history.json \
                  dashboard/data/meta.json    || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update price data [skip ci]"
            git push
            echo "✅ Pushed."
          fi
