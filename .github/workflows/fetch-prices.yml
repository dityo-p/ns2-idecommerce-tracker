name: Fetch prices

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours UTC

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "fetch"
        type: choice
        options:
          - fetch
          - export-only
          - status

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      # ── Diagnose secrets before running ──────────────────────────────────────
      # This step prints clearly whether each secret is set or empty.
      # It never prints the actual key value.
      - name: Check secrets
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
        run: |
          echo "=== Secret check ==="
          if [ -n "$SERPAPI_KEY" ]; then
            echo "✅ SERPAPI_KEY is set (length: ${#SERPAPI_KEY})"
          else
            echo "❌ SERPAPI_KEY is NOT set"
          fi
          if [ -n "$SERPER_KEY" ]; then
            echo "✅ SERPER_KEY is set (length: ${#SERPER_KEY})"
          else
            echo "❌ SERPER_KEY is NOT set"
          fi
          if [ -z "$SERPAPI_KEY" ] && [ -z "$SERPER_KEY" ]; then
            echo ""
            echo "⚠️  WARNING: No API keys found — engine will use demo data."
            echo "   Add SERPAPI_KEY or SERPER_KEY in:"
            echo "   Settings → Secrets and variables → Actions → New repository secret"
          fi
          echo "===================="

      # ── Restore SQLite DB from cache ──────────────────────────────────────────
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: engine/ns2_tracker.db
          key: ns2-db-${{ github.run_id }}
          restore-keys: |
            ns2-db-

      # ── Run diagnostics first (always visible in Actions log) ───────────────
      - name: Diagnose configuration
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          DATA_DIR:    ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: python main.py --diagnose

      # ── Run engine ────────────────────────────────────────────────────────────
      # DATA_DIR is set as an absolute path relative to GITHUB_WORKSPACE
      # so it is correct regardless of working-directory.
      - name: Run price engine
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          DATA_DIR:    ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: |
          MODE="${{ github.event.inputs.mode || 'fetch' }}"
          echo "Running in mode: $MODE"
          echo "DATA_DIR=$DATA_DIR"
          if [ "$MODE" = "export-only" ]; then
            python main.py --export-only
          elif [ "$MODE" = "status" ]; then
            python main.py --status
          else
            python main.py
          fi

      # ── Show what was written ─────────────────────────────────────────────────
      - name: Show exported data
        if: github.event.inputs.mode != 'status'
        run: |
          echo "=== dashboard/data contents ==="
          ls -lh dashboard/data/
          echo ""
          echo "=== prices.json (first 30 lines) ==="
          head -30 dashboard/data/prices.json || echo "(file not found)"
          echo ""
          echo "=== meta.json ==="
          cat dashboard/data/meta.json || echo "(file not found)"

      # ── Upload engine log ─────────────────────────────────────────────────────
      - name: Upload engine log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-log-${{ github.run_number }}
          path: engine/engine.log
          retention-days: 14

      # ── Commit updated JSON files ─────────────────────────────────────────────
      - name: Commit data files
        if: github.event.inputs.mode != 'status'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/prices.json \
                  dashboard/data/history.json \
                  dashboard/data/meta.json    || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update price data [skip ci]"
            git push
            echo "✅ Data committed and pushed."
          fi
