name: Fetch prices

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours UTC

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "fetch"
        type: choice
        options:
          - fetch
          - export-only
          - status
          - diagnose

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      # ── Restore SQLite DB from cache ──────────────────────────────────────────
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: engine/ns2_tracker.db
          # v2 prefix busts the old cache that had the stale sellers schema.
          # Increment this prefix whenever a breaking DB schema change is made.
          key: ns2-db-v2-${{ github.run_id }}
          restore-keys: |
            ns2-db-v2-

      # ── Diagnostics ───────────────────────────────────────────────────────────
      - name: Diagnose configuration
        env:
          DATA_DIR: ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: python main.py --diagnose

      # ── Run engine ────────────────────────────────────────────────────────────
      - name: Run price engine
        env:
          DATA_DIR: ${{ github.workspace }}/dashboard/data
        working-directory: engine
        run: |
          MODE="${{ github.event.inputs.mode || 'fetch' }}"
          echo "Mode: $MODE"
          if   [ "$MODE" = "export-only" ]; then python main.py --export-only
          elif [ "$MODE" = "status"      ]; then python main.py --status
          elif [ "$MODE" = "diagnose"    ]; then echo "(already ran above)"
          else python main.py
          fi

      # ── Show exported files ───────────────────────────────────────────────────
      - name: Show exported data
        if: always()
        run: |
          echo "=== dashboard/data ==="
          ls -lh dashboard/data/ 2>/dev/null || echo "(no data dir)"
          echo ""
          echo "=== prices.json ==="
          python3 -c "
          import json, sys
          try:
              d = json.load(open('dashboard/data/prices.json'))
              print(f'  source : {d.get(\"source\")}')
              print(f'  is_demo: {d.get(\"is_demo\")}')
              print(f'  updated: {d.get(\"updated_at\",\"\")[:19]}')
              print(f'  listings ({len(d.get(\"listings\",[]))}) :')
              for l in d.get('listings',[]):
                  print(f'    {l[\"seller\"]:<22} {l[\"platform\"]:<12} Rp {l[\"price\"]:>10,}  {l[\"stock\"]}')
          except Exception as e:
              print(f'  error reading prices.json: {e}')
          " 2>/dev/null || true

      # ── Upload engine log ─────────────────────────────────────────────────────
      - name: Upload engine log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-log-${{ github.run_number }}
          path: engine/engine.log
          retention-days: 14

      # ── Commit updated JSON files ─────────────────────────────────────────────
      - name: Commit data files
        if: github.event.inputs.mode != 'status' && github.event.inputs.mode != 'diagnose'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/prices.json \
                  dashboard/data/history.json \
                  dashboard/data/meta.json    || true
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update price data [skip ci]"
            git push
            echo "✅ Data committed and pushed."
          fi
