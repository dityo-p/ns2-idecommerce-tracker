name: Fetch prices

on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "fetch"
        type: choice
        options:
          - fetch          # full fetch → store → export
          - export-only    # re-export DB without fetching
          - status         # print status and exit (no file changes)

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # needed to git commit the updated JSON files

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      # ── 3. Restore SQLite database from cache ──────────────────────────────
      # This lets history accumulate across workflow runs.
      # Cache key rotates weekly so storage doesn't grow unbounded.
      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: engine/ns2_tracker.db
          key: ns2-db-${{ github.run_id }}
          restore-keys: |
            ns2-db-

      # ── 4. Run engine ──────────────────────────────────────────────────────
      - name: Run price engine
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPER_KEY:  ${{ secrets.SERPER_KEY }}
          DATA_DIR:    dashboard/data
        working-directory: engine
        run: |
          MODE="${{ github.event.inputs.mode || 'fetch' }}"
          if [ "$MODE" = "export-only" ]; then
            python main.py --export-only
          elif [ "$MODE" = "status" ]; then
            python main.py --status
          else
            python main.py
          fi

      # ── 5. Upload engine log as artifact ───────────────────────────────────
      - name: Upload engine log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-log-${{ github.run_number }}
          path: engine/engine.log
          retention-days: 14

      # ── 6. Commit updated JSON files ───────────────────────────────────────
      # Only commits if prices.json / history.json / meta.json actually changed.
      - name: Commit data files
        if: github.event.inputs.mode != 'status'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/prices.json \
                  dashboard/data/history.json \
                  dashboard/data/meta.json    || true
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: update price data [skip ci]"
            git push
          fi
